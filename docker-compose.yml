services:
  backend:
    restart: always
    build: .
    ports:
      - "8008:8008"
    volumes:
      - .:/code
    environment:
      DEBUG: 'true'
    env_file:
      - .env
    command: uvicorn app.main:app --reload --workers 1 --host 0.0.0.0 --port 8008
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  database:
    image: postgres:17.5-alpine
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "$POSTGRES_USER", "-d", "$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2.4-alpine
    ports:
      - "6380:6379"
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
